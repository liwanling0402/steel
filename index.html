    /* PWA 安装引导横幅 */
    .pwa-banner{position:fixed;bottom:0;left:0;right:0;z-index:999;background:linear-gradient(135deg,#1a2332,#2d4054);color:#fff;padding:16px 20px;display:none;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.3);animation:slideUp .3s ease-out}
    .pwa-banner.show{display:flex}

    .pwa-banner .pwa-info{flex:1;min-width:0}

  <!-- 自定义样式 -->

  <!-- 页面图标 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
</head>
<body class="app-body">

  <!-- ========== 顶部导航栏 ========== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="flex items-center justify-between h-16">
        <!-- Logo 区域 -->
        <div class="flex items-center gap-3">
          <span class="header-icon">🏭</span>
          <div>
            <h1 class="header-title">Steel</h1>
            <p class="header-subtitle">钢材加工管理系统</p>
          </div>
        </div>

        <!-- 桌面端导航 -->
        <nav class="hidden sm:flex gap-1" id="desktopNav">
          <button
            class="nav-btn active px-5 py-2.5 rounded-2xl text-sm font-semibold"
            data-page="form"
            onclick="switchPage('form')"
          >
            📝 生产计划录入
          </button>
          <button
            class="nav-btn px-5 py-2.5 rounded-2xl text-sm font-semibold"
            data-page="list"
            onclick="switchPage('list')"
          >
            📋 生产计划列表
          </button>
        </nav>

        <!-- 移动端菜单按钮 -->
        <button
          id="mobileMenuBtn"
          class="sm:hidden p-3 rounded-2xl text-steel-400 hover:bg-white/10 active:scale-95 transition-all duration-200"
          onclick="toggleMobileMenu()"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

      <!-- 移动端下拉导航 -->
      <div id="mobileNav" class="sm:hidden hidden pb-4">
        <button
          class="nav-btn active w-full text-left px-5 py-3.5 rounded-2xl text-sm font-semibold block"
          data-page="form"
          onclick="switchPage('form')"
        >
          📝 生产计划录入
        </button>
        <button
          class="nav-btn w-full text-left px-5 py-3.5 rounded-2xl text-sm font-semibold block mt-2"
          data-page="list"
          onclick="switchPage('list')"
        >
          📋 生产计划列表
        </button>
      </div>
    </div>
  </header>

  <!-- ========== 主内容区域 ========== -->
  <main class="app-main">
    <!-- 生产计划录入页面 -->
    <div id="page-form" class="page-content">
      <div class="page-header">
        <div class="page-header-icon">📝</div>
        <div>
          <h2 class="page-title">生产计划录入</h2>
          <p class="page-desc">填写钢材加工生产计划信息，所有数据将保存在本地浏览器中。</p>
        </div>
      </div>
      <div id="formContainer">
        <!-- 由 production-form.js 动态渲染 -->
      </div>
    </div>

    <!-- 生产计划列表页面 -->
    <div id="page-list" class="page-content hidden">
      <div class="page-header">
        <div class="page-header-icon">📋</div>
        <div>
          <h2 class="page-title">生产计划列表</h2>
          <p class="page-desc">查看、筛选、编辑和删除已录入的生产计划。</p>
        </div>
      </div>
      <div id="listContainer">
        <!-- 由 production-list.js 动态渲染 -->
      </div>
    </div>
  </main>

  <!-- ========== Toast 消息提示 ========== -->
  <div id="toast" class="app-toast hidden">
    <div class="toast-inner" id="toastContent">
    </div>
  </div>

  <!-- ========== 编辑弹窗 ========== -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal-card modal-card-sm" id="editModalContent">
      <!-- 由 production-list.js 动态渲染 -->
    </div>
  </div>

  <!-- ========== 删除确认弹窗 ========== -->
  <div id="deleteModal" class="modal-overlay hidden">
    <div class="modal-card modal-card-xs text-center p-8">
      <div class="modal-warn-icon">⚠️</div>
      <h3 class="modal-title mb-2">确认删除</h3>
      <p class="modal-desc mb-6" id="deleteMessage">确定要删除该生产计划吗？此操作不可恢复。</p>
      <div class="flex gap-3 justify-center">
        <button class="btn-cancel min-h-[48px] px-6 py-3" onclick="closeDeleteModal()">取消</button>
        <button class="btn-danger min-h-[48px] px-6 py-3" id="confirmDeleteBtn">确认删除</button>
      </div>
    </div>
  </div>

  <!-- ========== 进度管理弹窗 ========== -->
  <div id="progressModal" class="modal-overlay hidden">
    <div class="modal-card modal-card-md flex-col" id="progressModalContent">
      <!-- 由 production-list.js 动态渲染 -->
    </div>
  </div>

  <!-- ========== 进度变更二次确认弹窗 ========== -->
  <div id="confirmProgressModal" class="modal-overlay hidden" style="z-index:75;">
    <div class="modal-card modal-card-xs p-8">
      <div class="modal-warn-icon-sm">⚠️</div>
      <h3 class="modal-title mb-2 text-center">确认修改进度</h3>
      <p class="modal-desc mb-2 text-center" id="confirmProgressMsg">确认修改该订单的工序进度吗？</p>
      <div class="confirm-detail-card mb-6" id="confirmProgressDetail"></div>
      <div class="flex gap-3 justify-center">
        <button class="btn-cancel min-h-[48px] px-6 py-3" onclick="closeConfirmProgressModal()">取消</button>
        <button class="btn-primary min-h-[48px] px-6 py-3" id="confirmProgressBtn">确认修改</button>
      </div>
    </div>
  </div>

  <!-- ========== 搜索结果反馈弹窗 ========== -->
  <div id="searchResultModal" class="modal-overlay hidden">
    <div class="modal-card modal-card-xs p-8 text-center" id="searchResultContent">
      <!-- 由 production-list.js 动态渲染 -->
    </div>
  </div>

  <!-- ========== 三级详情弹窗 ========== -->
  <div id="detailModal" class="modal-overlay hidden">
    <div class="modal-card modal-card-lg flex-col" id="detailModalContent">
      <!-- 由 production-list.js 动态渲染 -->
    </div>
  </div>

  <!-- ========== 财务对账表格弹窗 ========== -->
  <div id="financeTableModal" class="modal-overlay hidden">
    <div class="modal-card modal-card-xl flex-col" id="financeTableModalContent">
      <!-- 由 production-list.js 动态渲染 -->
    </div>
  </div>

  <!-- ========== PWA Service Worker 注册 ========== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js', { scope: '/' }).then(function(reg) {
          console.log('[PWA] Service Worker registered:', reg.scope);
          // 监听更新
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] New version available, will update on next load');
                if (typeof showToast === 'function') {
                  showToast('有新版本，刷新后生效', 'info');
                }
              }
            });
          });
        }).catch(function(err) {
          console.log('[PWA] SW registration failed:', err);
        });
      });
    }
  </script>

  <!-- ========== JS 模块加载 ========== -->
  <script src="js/storage.js"></script>
  <script src="js/production-form.js"></script>
  <script src="js/production-list.js"></script>
  <script src="js/customer-service.js"></script>
  <script src="js/app.js"></script>

  <!-- ========== PWA 安装引导横幅 ========== -->
  <div class="pwa-banner" id="pwaBanner">
    <div class="pwa-icon">🏭</div>
    <div class="pwa-info">
      <div class="pwa-title">Steel 钢材管理系统</div>
      <div class="pwa-desc">添加到桌面，像APP一样使用</div>
    </div>
    <button class="pwa-btn" id="pwaInstallBtn">立即安装</button>
    <button class="pwa-close" id="pwaCloseBtn">✕</button>
  </div>

  <script>
    var deferredPrompt;
    var pwaBanner = document.getElementById('pwaBanner');
    var pwaInstallBtn = document.getElementById('pwaInstallBtn');
    var pwaCloseBtn = document.getElementById('pwaCloseBtn');

    // 检查是否已经安装
    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches
          || navigator.standalone
          || document.referrer.includes('android-app://');
    }

    // 显示安装横幅
    function showPwaBanner() {
      if (isStandalone()) return;
      if (localStorage.getItem('pwa_banner_closed')) return;
      setTimeout(function() { pwaBanner.classList.add('show'); }, 1500);
    }

    // 监听 beforeinstallprompt
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      showPwaBanner();
    });

    // 如果 3 秒后还没触发 beforeinstallprompt，也显示横幅（让用户手动操作）
    setTimeout(function() {
      if (!deferredPrompt && !pwaBanner.classList.contains('show')) {
        showPwaBanner();
        // 改为引导文字
        pwaInstallBtn.textContent = '查看教程';
        pwaInstallBtn.onclick = function() {
          var ua = navigator.userAgent;
          if (/iPhone|iPad|iPod/.test(ua)) {
            alert('iOS Safari：\n点击底部「分享」按钮 → 「添加到主屏幕」');
          } else if (/Android/.test(ua)) {
            alert('Chrome/浏览器：\n点击右上角「⋮」菜单 → 「添加到主屏幕」');
          } else {
            alert('点击浏览器菜单 → 「安装此网站」或「添加到主屏幕」');
          }
        };
      }
    }, 3000);

    // 安装按钮
    pwaInstallBtn.addEventListener('click', function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          console.log('[PWA] User choice:', result.outcome);
          deferredPrompt = null;
          pwaBanner.classList.remove('show');
        });
      }
    });

    // 关闭按钮
    pwaCloseBtn.addEventListener('click', function() {
      pwaBanner.classList.remove('show');
      localStorage.setItem('pwa_banner_closed', '1');
    });

    // 已安装就隐藏
    window.addEventListener('appinstalled', function() {
      pwaBanner.classList.remove('show');
      console.log('[PWA] App installed!');
    });
  </script>
