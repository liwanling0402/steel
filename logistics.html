<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a2332">
  <meta name="apple-mobile-web-app-title" content="物流跟踪">
  <title>🚚 物流跟进 - Steel 钢材管理系统</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- 核心样式（复用主站体系） -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Leaflet + OpenStreetMap（完全免费，无需 AK） -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    /* ==========================================
       物流页面专属样式 — 与主站风格统一
       ========================================== */
    :root {
      --logistics-primary: #2563eb;
      --logistics-transit: #f59e0b;
      --logistics-arrived: #10b981;
      --logistics-delayed: #ef4444;
      --logistics-bg: #f0f2f5;
    }

    .logistics-page {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: var(--logistics-bg);
      padding-bottom: calc(20px + var(--safe-bottom, 0px));
    }

    /* 顶部标题栏 — 与主站 header 风格完全一致 */
    .logistics-header {
      background: linear-gradient(135deg, #1a2332 0%, #2d4054 100%);
      padding: 1rem 1.25rem;
      padding-top: calc(1rem + var(--safe-top, 0px));
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 20px rgba(15,23,32,0.25);
    }

    .logistics-header-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logistics-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logistics-back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.25rem;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      text-decoration: none;
    }
    .logistics-back-btn:hover { background: rgba(255,255,255,0.2); }
    .logistics-back-btn:active { transform: scale(0.95); }

    .logistics-title {
      font-size: 1.125rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .logistics-subtitle {
      font-size: 0.6875rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* 主容器 */
    .logistics-main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* 搜索卡片 */
    .logistics-search-card {
      background: #fff;
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(15,23,32,0.06), 0 0 0 1px rgba(15,23,32,0.04);
      border: 1px solid rgba(180,195,210,0.15);
    }

    /* 查询模式切换标签 */
    .search-mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      background: #f3f4f6;
      border-radius: 10px;
      padding: 3px;
    }
    .search-mode-tab {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: none;
      background: transparent;
      color: #6b7280;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .search-mode-tab.active {
      background: #fff;
      color: #1e2533;
      box-shadow: 0 1px 4px rgba(15,23,32,0.08);
    }
    .search-mode-tab:hover:not(.active) {
      color: #374151;
      background: rgba(255,255,255,0.5);
    }

    /* 快递查询加载动画 */
    .express-loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: #eff6ff;
      border-radius: 8px;
      color: #2563eb;
      font-size: 0.875rem;
      font-weight: 500;
      margin-top: 0.75rem;
    }
    .express-loading-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #bfdbfe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 快递查询结果标签 */
    .express-result-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.625rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .express-result-badge.delivering { background: #eff6ff; color: #2563eb; }
    .express-result-badge.signed { background: #ecfdf5; color: #059669; }
    .express-result-badge.problem { background: #fef2f2; color: #dc2626; }

    .logistics-search-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .logistics-search-field {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }
    .logistics-search-field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .logistics-search-input {
      padding: 0.75rem 1rem;
      border: 1.5px solid rgba(180,195,210,0.4);
      border-radius: 8px;
      background: #f7f8fa;
      font-size: 1rem;
      color: #1e2533;
      outline: none;
      transition: all 0.15s;
      min-height: 46px;
      width: 100%;
      box-sizing: border-box;
    }
    .logistics-search-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .logistics-search-btn {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      box-shadow: 0 2px 8px rgba(37,99,235,0.25);
    }
    .logistics-search-btn:hover { box-shadow: 0 4px 14px rgba(37,99,235,0.35); transform: translateY(-1px); }
    .logistics-search-btn:active { transform: scale(0.97); }
    .logistics-search-btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; transform: none; }

    /* 订单信息卡 */
    .logistics-order-info {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      padding: 0.75rem 1rem;
      background: #f9fafb;
      border-radius: 8px;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: #4a5568;
    }
    .logistics-order-info strong { color: #1e2533; }

    /* 结算锁定警告 */
    .settle-lock-warning {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      color: #ef4444;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 0.375rem 0.625rem;
      background: #fef2f2;
      border-radius: 6px;
      border: 1px solid #fecaca;
      margin-top: 0.625rem;
    }

    /* 双栏布局 */
    .logistics-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* 地图卡片 */
    .logistics-map-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(15,23,32,0.06), 0 0 0 1px rgba(15,23,32,0.04);
      border: 1px solid rgba(180,195,210,0.15);
    }
    .logistics-map-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logistics-map-header h3 { font-size: 0.875rem; font-weight: 700; color: #1e2533; margin: 0; }
    .logistics-map-container {
      width: 100%;
      height: 400px;
      background: #e8ecf1;
      position: relative;
      z-index: 1;
    }

    /* 坐标编辑区 */
    .logistics-coord-edit {
      padding: 0.75rem 1rem;
      border-top: 1px solid #f3f4f6;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .logistics-coord-field {
      flex: 1;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .logistics-coord-field label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .logistics-coord-input {
      padding: 0.5rem 0.625rem;
      border: 1.5px solid rgba(180,195,210,0.4);
      border-radius: 6px;
      background: #f7f8fa;
      font-size: 0.9375rem;
      color: #1e2533;
      outline: none;
      min-height: 38px;
      width: 100%;
      box-sizing: border-box;
    }
    .logistics-coord-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .logistics-coord-input:disabled {
      opacity: 0.5;
      background: #e5e7eb;
      cursor: not-allowed;
    }

    .logistics-coord-btn {
      padding: 0.5rem 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 38px;
      white-space: nowrap;
    }
    .logistics-coord-btn:hover { background: #1d4ed8; }
    .logistics-coord-btn:active { transform: scale(0.97); }
    .logistics-coord-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
      transform: none;
    }

    /* 物流描述输入 */
    .logistics-desc-field {
      padding: 0.75rem 1rem;
      border-top: 1px solid #f3f4f6;
    }
    .logistics-desc-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .logistics-desc-input {
      flex: 1;
      padding: 0.625rem 0.75rem;
      border: 1.5px solid rgba(180,195,210,0.4);
      border-radius: 6px;
      background: #f7f8fa;
      font-size: 0.9375rem;
      color: #1e2533;
      outline: none;
      min-height: 40px;
      box-sizing: border-box;
    }
    .logistics-desc-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .logistics-desc-input:disabled {
      opacity: 0.5;
      background: #e5e7eb;
      cursor: not-allowed;
    }

    /* 时间轴卡片 */
    .logistics-timeline-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(15,23,32,0.06), 0 0 0 1px rgba(15,23,32,0.04);
      border: 1px solid rgba(180,195,210,0.15);
      display: flex;
      flex-direction: column;
      max-height: 600px;
    }
    .logistics-timeline-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logistics-timeline-header h3 { font-size: 0.875rem; font-weight: 700; color: #1e2533; margin: 0; }
    .logistics-timeline-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    /* 时间轴节点 */
    .logistics-timeline {
      position: relative;
      padding-left: 1.75rem;
    }
    .logistics-timeline::before {
      content: '';
      position: absolute;
      left: 0.5rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #2563eb 0%, #e5e7eb 100%);
    }
    .logistics-timeline-item {
      position: relative;
      padding-bottom: 1.25rem;
    }
    .logistics-timeline-item:last-child { padding-bottom: 0; }
    .logistics-timeline-dot {
      position: absolute;
      left: -1.45rem;
      top: 0.25rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2563eb;
      border: 2px solid #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
      z-index: 1;
    }
    .logistics-timeline-dot.transit { background: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
    .logistics-timeline-dot.arrived { background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
    .logistics-timeline-dot.departed { background: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .logistics-timeline-dot.delayed { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }
    .logistics-timeline-dot.manual { background: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,0.2); }
    .logistics-timeline-time {
      font-size: 0.6875rem;
      color: #a0aec0;
      margin-bottom: 0.125rem;
      font-weight: 500;
    }
    .logistics-timeline-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #1e2533;
      margin-bottom: 0.125rem;
    }
    .logistics-timeline-desc {
      font-size: 0.75rem;
      color: #4a5568;
      line-height: 1.5;
    }
    .logistics-timeline-location {
      font-size: 0.6875rem;
      color: #8896a8;
      margin-top: 0.125rem;
    }

    /* 空状态 */
    .logistics-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #a0aec0;
    }
    .logistics-empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .logistics-empty p { font-size: 0.875rem; }

    /* Toast 提示 */
    .logistics-toast {
      position: fixed;
      top: 5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.875rem;
      box-shadow: 0 8px 32px rgba(15,23,32,0.12), 0 4px 12px rgba(15,23,32,0.06);
      animation: logisticsToastIn 0.3s ease-out;
      pointer-events: none;
    }
    .logistics-toast.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .logistics-toast.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .logistics-toast.warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .logistics-toast.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    @keyframes logisticsToastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* 地图脉冲动画 */
    @keyframes pulse-ring {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .pulse-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(37,99,235,0.3);
      pointer-events: none;
      animation: pulse-ring 2s ease-out infinite;
    }

    /* 移动端响应式 */
    @media (max-width: 768px) {
      .logistics-content { grid-template-columns: 1fr; }
      .logistics-map-container { height: 280px; }
      .logistics-search-row { flex-direction: column; }
      .logistics-search-field { min-width: 0; width: 100%; }
      .logistics-search-btn { width: 100%; justify-content: center; }
      .logistics-coord-edit { flex-direction: column; }
      .logistics-coord-field { min-width: 0; }
      .logistics-timeline-card { max-height: none; }
      .logistics-main { padding: 0.75rem; }
      .logistics-order-info { flex-direction: column; gap: 0.25rem; }
      .logistics-desc-row { flex-direction: column; }
      .logistics-desc-row .logistics-coord-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="logistics-page">
  <!-- ========== 顶部导航栏 ========== -->
  <header class="logistics-header">
    <div class="logistics-header-inner">
      <div class="logistics-header-left">
        <a href="index.html" class="logistics-back-btn" title="返回主页">←</a>
        <div>
          <div class="logistics-title">🚚 物流跟进</div>
          <div class="logistics-subtitle">Logistics Tracking</div>
        </div>
      </div>
    </div>
  </header>

  <!-- ========== 主内容 ========== -->
  <main class="logistics-main">
    <!-- 搜索区域 -->
    <div class="logistics-search-card">
      <!-- 查询模式切换标签 -->
      <div class="search-mode-tabs">
        <button class="search-mode-tab active" data-mode="internal" onclick="switchSearchMode('internal')">
          📦 本系统订单
        </button>
        <button class="search-mode-tab" data-mode="external" onclick="switchSearchMode('external')">
          🌐 快递单号查询
        </button>
      </div>

      <!-- 本系统订单查询 -->
      <div class="search-mode-panel" id="internalSearchPanel">
        <div class="logistics-search-row">
          <div class="logistics-search-field">
            <label>📦 生产订单编号</label>
            <input
              type="text"
              id="orderSearchInput"
              class="logistics-search-input"
              placeholder="输入订单编号，如：SC20260603001"
              onkeydown="if(event.key==='Enter')searchLogistics()"
            />
          </div>
          <button class="logistics-search-btn" onclick="searchLogistics()">
            🔍 查询物流
          </button>
        </div>
      </div>

      <!-- 外部快递单号查询 -->
      <div class="search-mode-panel" id="externalSearchPanel" style="display:none;">
        <div class="logistics-search-row">
          <div class="logistics-search-field" style="min-width:140px;">
            <label>🚚 快递公司</label>
            <select id="expressCompanySelect" class="logistics-search-input" style="appearance:auto;">
              <option value="auto">🤖 自动识别</option>
              <option value="SF">顺丰速运</option>
              <option value="ZTO">中通快递</option>
              <option value="YTO">圆通速递</option>
              <option value="STO">申通快递</option>
              <option value="YD">韵达速递</option>
              <option value="EMS">EMS</option>
              <option value="HTKY">百世快递</option>
              <option value="DBL">德邦物流</option>
              <option value="JTSD">极兔速递</option>
              <option value="JD">京东物流</option>
              <option value="YZPY">邮政快递包裹</option>
              <option value="GTO">国通快递</option>
              <option value="UC">优速快递</option>
              <option value="DBL">德邦快递</option>
              <option value="QFKD">全峰快递</option>
              <option value="ZJS">宅急送</option>
            </select>
          </div>
          <div class="logistics-search-field">
            <label>🔢 快递单号</label>
            <input
              type="text"
              id="expressNoInput"
              class="logistics-search-input"
              placeholder="输入快递单号，如：SF1234567890"
              onkeydown="if(event.key==='Enter')searchExternalExpress()"
            />
          </div>
          <button class="logistics-search-btn" id="expressSearchBtn" onclick="searchExternalExpress()">
            🔍 查物流
          </button>
        </div>
        <div id="expressSearchHint" style="font-size:0.6875rem;color:#a0aec0;margin-top:0.5rem;">
          💡 选择「自动识别」系统会根据单号自动判断快递公司
        </div>
      </div>

      <div id="orderInfoArea" style="margin-top:0;"></div>
    </div>

    <!-- 双栏内容区 -->
    <div class="logistics-content" id="logisticsContent" style="display:none;">
      <!-- 左侧地图 -->
      <div class="logistics-map-card">
        <div class="logistics-map-header">
          <h3>📍 实时物流地图</h3>
          <span style="font-size:0.75rem;color:#a0aec0;" id="mapUpdateTime"></span>
        </div>
        <div class="logistics-map-container" id="logisticsMap"></div>
        <!-- 坐标编辑 -->
        <div class="logistics-coord-edit">
          <div class="logistics-coord-field">
            <label>纬度 (Latitude)</label>
            <input type="text" id="editLat" class="logistics-coord-input" placeholder="例：39.915" />
          </div>
          <div class="logistics-coord-field">
            <label>经度 (Longitude)</label>
            <input type="text" id="editLng" class="logistics-coord-input" placeholder="例：116.404" />
          </div>
          <button class="logistics-coord-btn" id="updateLocBtn" onclick="updateLocation()">📍 更新位置</button>
        </div>
        <!-- 物流描述 -->
        <div class="logistics-desc-field">
          <div class="logistics-desc-row">
            <input
              type="text"
              id="editDesc"
              class="logistics-desc-input"
              placeholder="添加物流描述，如：货物已到达中转仓库..."
              maxlength="200"
            />
            <button class="logistics-coord-btn" id="addNodeBtn" onclick="addLogisticsNode()">✏️ 添加节点</button>
          </div>

      </div>

      <!-- 右侧时间轴 -->
      <div class="logistics-timeline-card">
        <div class="logistics-timeline-header">
          <h3>📋 物流流转记录</h3>
          <span style="font-size:0.6875rem;color:#a0aec0;" id="timelineCount"></span>
        </div>

          <div class="logistics-empty">
            <div class="logistics-empty-icon">📭</div>
            <p>暂无物流记录</p>

    <!-- 初始空状态 -->
    <div id="emptyState" style="text-align:center;padding:3rem 1rem;">
      <div style="font-size:4rem;margin-bottom:1rem;">🚛</div>
      <h3 style="color:#4a5568;margin-bottom:0.5rem;">物流跟进</h3>
      <p style="color:#a0aec0;font-size:0.875rem;">
        输入生产订单编号，查询货物的实时物流信息
      </p>
    </div>
  </main>
</div>

<!-- Toast -->
<div id="logisticsToast" class="logistics-toast" style="display:none;"></div>

<!-- 复用主站完整存储层（保证数据格式一致，避免页面切换时数据丢失） -->
<script src="js/storage.js"></script>
<script>
// ==========================================
// 物流数据存储层
// ==========================================
var LOGISTICS_STORAGE_KEY = 'steel_logistics_data';

function getLogisticsData() {
  try {
    var data = localStorage.getItem(LOGISTICS_STORAGE_KEY);
    return data ? JSON.parse(data) : {};
  } catch (e) { return {}; }
}

function saveLogisticsData(data) {
  try {
    localStorage.setItem(LOGISTICS_STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    showToast('保存失败，存储空间可能已满', 'error');
  }
}

function getLogisticsByPlanNo(planNo) {
  var all = getLogisticsData();
  return all[planNo] || null;
}

/**
 * 初始化订单物流（首次查询时创建）
 */
function initLogisticsForOrder(planNo, plan) {
  var all = getLogisticsData();
  if (all[planNo]) return all[planNo];

  var now = new Date().toISOString();
  var logistics = {
    planNo: planNo,
    origin: { lat: 39.634, lng: 118.180, name: '唐山钢铁厂区仓库' },
    destination: { lat: 31.204, lng: 121.589, name: '客户指定仓库' },
    current: { lat: 39.634, lng: 118.180 },
    nodes: [
      {
        type: 'departed',
        title: '订单已创建',
        desc: '生产计划「' + (plan.planNo || planNo) + '」已录入系统，等待物流调度',
        location: '系统',
        time: plan.createdAt || now,
        lat: null,
        lng: null
      }
    ],
    updatedAt: now
  };

  all[planNo] = logistics;
  saveLogisticsData(all);
  return logistics;
}

/**
 * 通过订单编号查找计划（复用 storage.js 的 getPlans + normalizePlan）
 */
function getPlanByPlanNo(planNo) {
  var plans = getPlans();
  return plans.find(function(p) { return p.planNo === planNo; }) || null;
}

// ==========================================
// Leaflet + OpenStreetMap（免费开源，无需密钥）
// ==========================================
var mapInstance = null;
var currentLogistics = null;
var currentPlan = null;
var mapLayers = [];

// 自定义图标工厂
var iconFactory = {
  origin: L.divIcon({
    className: '',
    html: '<div style="background:#1a2332;color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);">🏭</div>',
    iconSize: [28, 28], iconAnchor: [14, 14]
  }),
  dest: L.divIcon({
    className: '',
    html: '<div style="background:#10b981;color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);">📦</div>',
    iconSize: [28, 28], iconAnchor: [14, 14]
  }),
  current: L.divIcon({
    className: '',
    html: '<div style="background:#2563eb;color:#fff;width:36px;height:36px;border-radius:50%;text-align:center;line-height:36px;font-size:20px;border:3px solid #fff;box-shadow:0 3px 12px rgba(37,99,235,0.5);">🚛</div>',
    iconSize: [36, 36], iconAnchor: [18, 18]
  })
};

function initMap() {
  if (mapInstance) return;
  var container = document.getElementById('logisticsMap');
  if (!container || container.offsetWidth === 0) return;
  if (container._mapInitializing) return;
  container._mapInitializing = true;

  try {
    if (typeof L === 'undefined') {
      container.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:0.875rem;text-align:center;">' +
        '📍 地图库加载中...<br><small>请检查网络连接后刷新页面</small></div>';
      container._mapInitializing = false;
      return;
    }

    mapInstance = L.map('logisticsMap', {
      center: [39.634, 118.180],
      zoom: 6,
      zoomControl: true,
      attributionControl: false,
      scrollWheelZoom: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      minZoom: 3
    }).addTo(mapInstance);

    container._mapInitializing = false;
    renderMapMarkers();
  } catch (e) {
    console.error('地图初始化失败:', e);
    container.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:0.875rem;text-align:center;">' +
      '⚠️ 地图加载失败<br><small>请检查网络连接后刷新页面</small></div>';
    container._mapInitializing = false;
  }
}

/**
 * 渲染地图标记（起点、终点、小车、路线）
 * 仿淘宝物流地图风格
 */
function renderMapMarkers() {
  if (!mapInstance || !currentLogistics) return;

  // 清除旧图层
  mapLayers.forEach(function(l) { try { mapInstance.removeLayer(l); } catch(e) {} });
  mapLayers = [];

  var origin = currentLogistics.origin;
  var dest = currentLogistics.destination;
  var current = currentLogistics.current;

  // 起点标记
  if (origin && origin.lat && origin.lng) {
    var originMarker = L.marker([origin.lat, origin.lng], { icon: iconFactory.origin }).addTo(mapInstance);
    var originLabel = L.marker([origin.lat, origin.lng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:rgba(26,35,50,0.9);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap;">🏭 ' + escapeHtml(origin.name || '厂区') + '</div>',
        iconSize: [140, 24], iconAnchor: [70, -10]
      })
    }).addTo(mapInstance);
    mapLayers.push(originMarker, originLabel);
  }

  // 终点标记
  if (dest && dest.lat && dest.lng) {
    var destMarker = L.marker([dest.lat, dest.lng], { icon: iconFactory.dest }).addTo(mapInstance);
    var destLabel = L.marker([dest.lat, dest.lng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:rgba(16,185,129,0.9);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap;">📦 ' + escapeHtml(dest.name || '目的地') + '</div>',
        iconSize: [140, 24], iconAnchor: [70, -10]
      })
    }).addTo(mapInstance);
    mapLayers.push(destMarker, destLabel);
  }

  // 当前位置小车标记 + 脉动圆环
  if (current && current.lat && current.lng) {
    var currentMarker = L.marker([current.lat, current.lng], { icon: iconFactory.current }).addTo(mapInstance);
    var currentLabel = L.marker([current.lat, current.lng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:rgba(37,99,235,0.95);color:#fff;padding:5px 12px;border-radius:8px;font-size:13px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);white-space:nowrap;">🚛 当前位置</div>',
        iconSize: [110, 30], iconAnchor: [55, -18]
      })
    }).addTo(mapInstance);
    var circle = L.circle([current.lat, current.lng], {
      radius: 30000,
      color: '#2563eb',
      weight: 2,
      opacity: 0.3,
      fillColor: '#2563eb',
      fillOpacity: 0.08
    }).addTo(mapInstance);
    mapLayers.push(currentMarker, currentLabel, circle);
  }

  // 绘制虚线路线（仿淘宝风格）
  if (origin && origin.lat && origin.lng && dest && dest.lat && dest.lng) {
    var latlngs = [[origin.lat, origin.lng]];
    if (current && current.lat && current.lng) {
      latlngs.push([current.lat, current.lng]);
    }
    latlngs.push([dest.lat, dest.lng]);

    if (latlngs.length >= 2) {
      var polyline = L.polyline(latlngs, {
        color: '#2563eb',
        weight: 3,
        opacity: 0.6,
        dashArray: '10, 8',
        lineJoin: 'round'
      }).addTo(mapInstance);
      mapLayers.push(polyline);
    }
  }

  // 自适应视野
  try {
    var bounds = [];
    if (origin && origin.lat && origin.lng) bounds.push([origin.lat, origin.lng]);
    if (dest && dest.lat && dest.lng) bounds.push([dest.lat, dest.lng]);
    if (current && current.lat && current.lng) bounds.push([current.lat, current.lng]);
    if (bounds.length >= 2) {
      mapInstance.fitBounds(bounds, { padding: [40, 40] });
    } else if (bounds.length === 1) {
      mapInstance.setView(bounds[0], 12);
    }
  } catch (e) {}
}

// ==========================================
// 时间轴渲染
// ==========================================
function renderTimeline() {
  var body = document.getElementById('timelineBody');
  var countEl = document.getElementById('timelineCount');
  if (!body || !currentLogistics) return;

  var nodes = currentLogistics.nodes || [];
  countEl.textContent = '共 ' + nodes.length + ' 条记录';

  if (nodes.length === 0) {
    body.innerHTML = '<div class="logistics-empty"><div class="logistics-empty-icon">📭</div><p>暂无物流记录</p></div>';
    return;
  }

  // 倒序显示（最新在前）
  var reversed = nodes.slice().reverse();
  var html = '<div class="logistics-timeline">';

  reversed.forEach(function(node, idx) {
    var timeStr = formatTime(node.time);
    var dotClass = 'logistics-timeline-dot ' + (node.type || 'departed');
    var typeIcon = getNodeIcon(node.type);

    html += '<div class="logistics-timeline-item">';
    html += '<div class="' + dotClass + '"></div>';
    html += '<div class="logistics-timeline-time">' + timeStr + '</div>';
    html += '<div class="logistics-timeline-title">' + typeIcon + ' ' + escapeHtml(node.title || '') + '</div>';
    if (node.desc) {
      html += '<div class="logistics-timeline-desc">' + escapeHtml(node.desc) + '</div>';
    }
    if (node.location) {
      html += '<div class="logistics-timeline-location">📍 ' + escapeHtml(node.location) + '</div>';
    }
    html += '</div>';
  });

  html += '</div>';
  body.innerHTML = html;
}

function formatTime(isoStr) {
  if (!isoStr) return '';
  try {
    var d = new Date(isoStr);
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    var h = String(d.getHours()).padStart(2, '0');
    var min = String(d.getMinutes()).padStart(2, '0');
    return y + '-' + m + '-' + day + ' ' + h + ':' + min;
  } catch (e) { return isoStr.slice(0, 19).replace('T', ' '); }
}

function getNodeIcon(type) {
  var icons = {
    'departed': '🚚',
    'transit': '🔄',
    'arrived': '✅',
    'delayed': '⚠️',
    'manual': '📝'
  };
  return icons[type] || '📌';
}

// ==========================================
// 订单信息展示 + 财务联动
// ==========================================
function showOrderInfo(plan) {
  var area = document.getElementById('orderInfoArea');
  if (!plan) { area.innerHTML = ''; return; }

  var settleLabel = plan.settleStatus === 'settled' ? '已结算' :
                    plan.settleStatus === 'partial' ? '部分结算' : '未结算';
  var settleColor = plan.settleStatus === 'settled' ? '#10b981' :
                    plan.settleStatus === 'partial' ? '#f59e0b' : '#ef4444';
  // 已结算订单允许编辑物流，未结算/部分结算锁定
  var isSettled = plan.settleStatus === 'settled';

  area.innerHTML =
    '<div class="logistics-order-info">' +
    '<span>📦 <strong>' + escapeHtml(plan.steelType || '-') + '</strong></span>' +
    '<span>规格: <strong>' + escapeHtml(plan.specification || '-') + '</strong></span>' +
    '<span>数量: <strong>' + (plan.quantity || 0) + ' ' + escapeHtml(plan.unit || '吨') + '</strong></span>' +
    '<span>客户: <strong>' + escapeHtml(plan.customer || '-') + '</strong></span>' +
    '<span>结算: <strong style="color:' + settleColor + '">' + settleLabel + '</strong></span>' +
    '</div>' +
    (isSettled ? '' :
    '<div class="settle-lock-warning">' +
    '🔒 该订单尚未完成财务结算，无法修改物流数据。请在 <strong>财务对账</strong> 中完成结算后操作。' +
    '</div>');

  // 更新编辑按钮状态：已结算才启用
  updateEditControlsState(isSettled);
}

/**
 * 根据结算状态启用/禁用编辑控件
 * isSettled=true 时启用，false 时禁用
 */
function updateEditControlsState(isSettled) {
  var latInput = document.getElementById('editLat');
  var lngInput = document.getElementById('editLng');
  var descInput = document.getElementById('editDesc');
  var updateBtn = document.getElementById('updateLocBtn');
  var addNodeBtn = document.getElementById('addNodeBtn');

  if (latInput) latInput.disabled = !isSettled;
  if (lngInput) lngInput.disabled = !isSettled;
  if (descInput) descInput.disabled = !isSettled;
  if (updateBtn) updateBtn.disabled = !isSettled;
  if (addNodeBtn) addNodeBtn.disabled = !isSettled;
}

// ==========================================
// 核心功能
// ==========================================

/**
 * 查询物流
 */
function searchLogistics() {
  var input = document.getElementById('orderSearchInput');
  var planNo = (input.value || '').trim();

  if (!planNo) {
    showToast('请输入订单编号', 'warning');
    return;
  }

  // 查找订单
  var plan = getPlanByPlanNo(planNo);
  if (!plan) {
    showToast('未找到订单「' + planNo + '」，请检查编号是否正确', 'error');
    document.getElementById('logisticsContent').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  currentPlan = plan;

  // 获取或创建物流数据
  var logistics = getLogisticsByPlanNo(planNo);
  if (!logistics) {
    logistics = initLogisticsForOrder(planNo, plan);
  }

  currentLogistics = logistics;

  // 显示内容区
  document.getElementById('logisticsContent').style.display = '';
  document.getElementById('emptyState').style.display = 'none';

  // 显示订单信息
  showOrderInfo(plan);

  // 更新地图时间
  document.getElementById('mapUpdateTime').textContent =
    '更新于 ' + formatTime(logistics.updatedAt);

  // 填充坐标编辑框
  document.getElementById('editLat').value = logistics.current.lat || '';
  document.getElementById('editLng').value = logistics.current.lng || '';

  // 初始化地图（延迟以确保 DOM 可见）
  setTimeout(function() { initMap(); }, 300);

  // 渲染时间轴
  renderTimeline();
}

/**
 * 更新货物位置（需已结算）
 */
function updateLocation() {
  if (!currentLogistics || !currentPlan) {
    showToast('请先查询订单物流', 'warning');
    return;
  }

  // 财务联动：检查结算状态
  if (currentPlan.settleStatus !== 'settled') {
    showToast('🔒 订单尚未完成财务结算，无法修改物流数据', 'warning');
    return;
  }

  var latStr = document.getElementById('editLat').value.trim();
  var lngStr = document.getElementById('editLng').value.trim();

  if (!latStr || !lngStr) {
    showToast('请输入完整的经纬度坐标', 'warning');
    return;
  }

  var lat = parseFloat(latStr);
  var lng = parseFloat(lngStr);

  if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
    showToast('经纬度格式不正确，请输入有效坐标', 'error');
    return;
  }

  // 更新当前位置
  currentLogistics.current.lat = lat;
  currentLogistics.current.lng = lng;
  currentLogistics.updatedAt = new Date().toISOString();

  // 自动添加物流节点
  currentLogistics.nodes.push({
    type: 'manual',
    title: '位置更新',
    desc: '手动更新货物位置至坐标 (' + lat.toFixed(4) + ', ' + lng.toFixed(4) + ')',
    location: lat.toFixed(4) + ', ' + lng.toFixed(4),
    time: currentLogistics.updatedAt,
    lat: lat,
    lng: lng
  });

  // 保存
  var all = getLogisticsData();
  all[currentLogistics.planNo] = currentLogistics;
  saveLogisticsData(all);

  // 更新UI
  document.getElementById('mapUpdateTime').textContent =
    '更新于 ' + formatTime(currentLogistics.updatedAt);
  renderMapMarkers();
  renderTimeline();

  showToast('✅ 货物位置已更新，小车已移动至新坐标', 'success');
}

/**
 * 添加物流描述节点（需已结算）
 */
function addLogisticsNode() {
  if (!currentLogistics || !currentPlan) {
    showToast('请先查询订单物流', 'warning');
    return;
  }

  // 财务联动：检查结算状态
  if (currentPlan.settleStatus !== 'settled') {
    showToast('🔒 订单尚未完成财务结算，无法修改物流数据', 'warning');
    return;
  }

  var desc = document.getElementById('editDesc').value.trim();
  if (!desc) {
    showToast('请输入物流描述', 'warning');
    return;
  }

  var now = new Date().toISOString();
  var lat = currentLogistics.current.lat;
  var lng = currentLogistics.current.lng;

  // 智能判断节点类型
  var nodeType = 'manual';
  var lowerDesc = desc.toLowerCase();
  if (lowerDesc.indexOf('到达') !== -1 || lowerDesc.indexOf('抵达') !== -1 || lowerDesc.indexOf('签收') !== -1) {
    nodeType = 'arrived';
  } else if (lowerDesc.indexOf('中转') !== -1 || lowerDesc.indexOf('运输') !== -1 || lowerDesc.indexOf('途中') !== -1) {
    nodeType = 'transit';
  } else if (lowerDesc.indexOf('延误') !== -1 || lowerDesc.indexOf('延迟') !== -1 || lowerDesc.indexOf('延期') !== -1) {
    nodeType = 'delayed';
  } else if (lowerDesc.indexOf('出发') !== -1 || lowerDesc.indexOf('发车') !== -1 || lowerDesc.indexOf('出厂') !== -1 || lowerDesc.indexOf('装车') !== -1) {
    nodeType = 'departed';
  }

  currentLogistics.nodes.push({
    type: nodeType,
    title: getNodeTypeLabel(nodeType),
    desc: desc,
    location: lat && lng ? (lat.toFixed(4) + ', ' + lng.toFixed(4)) : '未知位置',
    time: now,
    lat: lat,
    lng: lng
  });

  currentLogistics.updatedAt = now;

  // 保存
  var all = getLogisticsData();
  all[currentLogistics.planNo] = currentLogistics;
  saveLogisticsData(all);

  // 清空输入
  document.getElementById('editDesc').value = '';

  // 更新UI
  renderTimeline();
  showToast('✅ 物流节点已添加', 'success');
}

function getNodeTypeLabel(type) {
  var labels = {
    'departed': '🚚 已出发',
    'transit': '🔄 运输中',
    'arrived': '✅ 已到达',
    'delayed': '⚠️ 延迟',
    'manual': '📝 手动记录'
  };
  return labels[type] || '📝 手动记录';
}

// ==========================================
// 工具函数
// ==========================================
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// ==========================================
// 查询模式切换
// ==========================================
var currentSearchMode = 'internal';

function switchSearchMode(mode) {
  currentSearchMode = mode;

  // 更新标签状态
  var tabs = document.querySelectorAll('.search-mode-tab');
  tabs.forEach(function(t) {
    if (t.getAttribute('data-mode') === mode) {
      t.classList.add('active');
    } else {
      t.classList.remove('active');
    }
  });

  // 切换面板
  document.getElementById('internalSearchPanel').style.display = (mode === 'internal') ? '' : 'none';
  document.getElementById('externalSearchPanel').style.display = (mode === 'external') ? '' : 'none';

  // 如果是外部查询模式且尚未显示过，保持本系统结果
  if (mode === 'internal') {
    // 切回本系统模式，恢复之前的结果
    if (currentPlan) {
      document.getElementById('logisticsContent').style.display = '';
      document.getElementById('emptyState').style.display = 'none';
    }
  }
}

// 常用快递公司编码映射（用于自动识别）
var EXPRESS_CODE_PATTERNS = [
  { code: 'SF',   pattern: /^SF\d{12,14}$/i },
  { code: 'ZTO',  pattern: /^(7[0-8][0-9]{10,12}|ZTO\d+)$/i },
  { code: 'YTO',  pattern: /^YT\d{10,14}$/i },
  { code: 'STO',  pattern: /^(3[0-9]{11,13}|7[0-9]{11})$|^88[0-9]{10,12}$/i },
  { code: 'YD',   pattern: /^(4[0-9]{11,13}|7[0-9]{13}|[A-Z]{2}\d{10,13})$/i },
  { code: 'EMS',  pattern: /^[A-Z]{2}\d{9,11}[A-Z]{2}$/i },
  { code: 'HTKY', pattern: /^[A-Z]{2}\d{12,14}$/i },
  { code: 'JTSD', pattern: /^JT\d{12,14}$/i },
  { code: 'JD',   pattern: /^JD[A-Z0-9]{10,16}$/i },
  { code: 'DBL',  pattern: /^D\d{9,12}$/i },
];

/**
 * MD5 加密（纯 JS 实现）
 */
function md5(str) {
  function rotateLeft(lValue, iShiftBits) {
    return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
  }
  function addUnsigned(lX, lY) {
    var lX4, lY4, lX8, lY8, lResult;
    lX8 = (lX & 0x80000000);
    lY8 = (lY & 0x80000000);
    lX4 = (lX & 0x40000000);
    lY4 = (lY & 0x40000000);
    lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
    if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
    if (lX4 | lY4) {
      if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
      else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
    } else {
      return (lResult ^ lX8 ^ lY8);
    }
  }
  function F(x, y, z) { return (x & y) | ((~x) & z); }
  function G(x, y, z) { return (x & z) | (y & (~z)); }
  function H(x, y, z) { return (x ^ y ^ z); }
  function I(x, y, z) { return (y ^ (x | (~z))); }
  function FF(a, b, c, d, x, s, ac) {
    a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac));
    return addUnsigned(rotateLeft(a, s), b);
  }
  function GG(a, b, c, d, x, s, ac) {
    a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac));
    return addUnsigned(rotateLeft(a, s), b);
  }
  function HH(a, b, c, d, x, s, ac) {
    a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac));
    return addUnsigned(rotateLeft(a, s), b);
  }
  function II(a, b, c, d, x, s, ac) {
    a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac));
    return addUnsigned(rotateLeft(a, s), b);
  }
  function convertToWordArray(str) {
    var lWordCount;
    var lMessageLength = str.length;
    var lNumberOfWords_temp1 = lMessageLength + 8;
    var lNumberOfWords_temp2 = (lNumberOfWords_temp1 - (lNumberOfWords_temp1 % 64)) / 64;
    var lNumberOfWords = (lNumberOfWords_temp2 + 1) * 16;
    var lWordArray = new Array(lNumberOfWords - 1);
    var lBytePosition = 0;
    var lByteCount = 0;
    while (lByteCount < lMessageLength) {
      lWordCount = (lByteCount - (lByteCount % 4)) / 4;
      lBytePosition = (lByteCount % 4) * 8;
      lWordArray[lWordCount] = (lWordArray[lWordCount] | (str.charCodeAt(lByteCount) << lBytePosition));
      lByteCount++;
    }
    lWordCount = (lByteCount - (lByteCount % 4)) / 4;
    lBytePosition = (lByteCount % 4) * 8;
    lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
    lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
    lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
    return lWordArray;
  }
  function wordToHex(lValue) {
    var wordToHexValue = '', wordToHexValue_temp = '', lByte, lCount;
    for (lCount = 0; lCount <= 3; lCount++) {
      lByte = (lValue >>> (lCount * 8)) & 255;
      wordToHexValue_temp = '0' + lByte.toString(16);
      wordToHexValue = wordToHexValue + wordToHexValue_temp.substr(wordToHexValue_temp.length - 2, 2);
    }
    return wordToHexValue;
  }

  var x = [];
  var k, AA, BB, CC, DD, a, b, c, d;
  var S11 = 7, S12 = 12, S13 = 17, S14 = 22;
  var S21 = 5, S22 = 9, S23 = 14, S24 = 20;
  var S31 = 4, S32 = 11, S33 = 16, S34 = 23;
  var S41 = 6, S42 = 10, S43 = 15, S44 = 21;

  str = utf8Encode(str);
  x = convertToWordArray(str);
  a = 0x67452301; b = 0xEFCDAB89; c = 0x98BADCFE; d = 0x10325476;

  for (k = 0; k < x.length; k += 16) {
    AA = a; BB = b; CC = c; DD = d;
    a = FF(a, b, c, d, x[k+0],  S11, 0xD76AA478);
    d = FF(d, a, b, c, x[k+1],  S12, 0xE8C7B756);
    c = FF(c, d, a, b, x[k+2],  S13, 0x242070DB);
    b = FF(b, c, d, a, x[k+3],  S14, 0xC1BDCEEE);
    a = FF(a, b, c, d, x[k+4],  S11, 0xF57C0FAF);
    d = FF(d, a, b, c, x[k+5],  S12, 0x4787C62A);
    c = FF(c, d, a, b, x[k+6],  S13, 0xA8304613);
    b = FF(b, c, d, a, x[k+7],  S14, 0xFD469501);
    a = FF(a, b, c, d, x[k+8],  S11, 0x698098D8);
    d = FF(d, a, b, c, x[k+9],  S12, 0x8B44F7AF);
    c = FF(c, d, a, b, x[k+10], S13, 0xFFFF5BB1);
    b = FF(b, c, d, a, x[k+11], S14, 0x895CD7BE);
    a = FF(a, b, c, d, x[k+12], S11, 0x6B901122);
    d = FF(d, a, b, c, x[k+13], S12, 0xFD987193);
    c = FF(c, d, a, b, x[k+14], S13, 0xA679438E);
    b = FF(b, c, d, a, x[k+15], S14, 0x49B40821);
    a = GG(a, b, c, d, x[k+1],  S21, 0xF61E2562);
    d = GG(d, a, b, c, x[k+6],  S22, 0xC040B340);
    c = GG(c, d, a, b, x[k+11], S23, 0x265E5A51);
    b = GG(b, c, d, a, x[k+0],  S24, 0xE9B6C7AA);
    a = GG(a, b, c, d, x[k+5],  S21, 0xD62F105D);
    d = GG(d, a, b, c, x[k+10], S22, 0x2441453);
    c = GG(c, d, a, b, x[k+15], S23, 0xD8A1E681);
    b = GG(b, c, d, a, x[k+4],  S24, 0xE7D3FBC8);
    a = GG(a, b, c, d, x[k+9],  S21, 0x21E1CDE6);
    d = GG(d, a, b, c, x[k+14], S22, 0xC33707D6);
    c = GG(c, d, a, b, x[k+3],  S23, 0xF4D50D87);
    b = GG(b, c, d, a, x[k+8],  S24, 0x455A14ED);
    a = GG(a, b, c, d, x[k+13], S21, 0xA9E3E905);
    d = GG(d, a, b, c, x[k+2],  S22, 0xFCEFA3F8);
    c = GG(c, d, a, b, x[k+7],  S23, 0x676F02D9);
    b = GG(b, c, d, a, x[k+12], S24, 0x8D2A4C8A);
    a = HH(a, b, c, d, x[k+5],  S31, 0xFFFA3942);
    d = HH(d, a, b, c, x[k+8],  S32, 0x8771F681);
    c = HH(c, d, a, b, x[k+11], S33, 0x6D9D6122);
    b = HH(b, c, d, a, x[k+14], S34, 0xFDE5380C);
    a = HH(a, b, c, d, x[k+1],  S31, 0xA4BEEA44);
    d = HH(d, a, b, c, x[k+4],  S32, 0x4BDECFA9);
    c = HH(c, d, a, b, x[k+7],  S33, 0xF6BB4B60);
    b = HH(b, c, d, a, x[k+12], S34, 0xBEBFBC70);
    a = HH(a, b, c, d, x[k+9],  S31, 0x289B7EC6);
    d = HH(d, a, b, c, x[k+0],  S32, 0xEAA127FA);
    c = HH(c, d, a, b, x[k+3],  S33, 0xD4EF3085);
    b = HH(b, c, d, a, x[k+6],  S34, 0x4881D05);
    a = HH(a, b, c, d, x[k+13], S31, 0xD9D4D039);
    d = HH(d, a, b, c, x[k+2],  S32, 0xE6DB99E5);
    c = HH(c, d, a, b, x[k+15], S33, 0x1FA27CF8);
    b = HH(b, c, d, a, x[k+10], S34, 0xC4AC5665);
    a = II(a, b, c, d, x[k+0],  S41, 0xF4292244);
    d = II(d, a, b, c, x[k+13], S42, 0x432AFF97);
    c = II(c, d, a, b, x[k+10], S43, 0xAB9423A7);
    b = II(b, c, d, a, x[k+7],  S44, 0xFC93A039);
    a = II(a, b, c, d, x[k+14], S41, 0x655B59C3);
    d = II(d, a, b, c, x[k+3],  S42, 0x8F0CCC92);
    c = II(c, d, a, b, x[k+8],  S43, 0xFFEFF47D);
    b = II(b, c, d, a, x[k+1],  S44, 0x85845DD1);
    a = II(a, b, c, d, x[k+6],  S41, 0x6FA87E4F);
    d = II(d, a, b, c, x[k+11], S42, 0xFE2CE6E0);
    c = II(c, d, a, b, x[k+0],  S43, 0xA3014314);
    b = II(b, c, d, a, x[k+5],  S44, 0x4E0811A1);
    a = II(a, b, c, d, x[k+12], S41, 0xF7537E82);
    d = II(d, a, b, c, x[k+15], S42, 0xBD3AF235);
    c = II(c, d, a, b, x[k+2],  S43, 0x2AD7D2BB);
    b = II(b, c, d, a, x[k+9],  S44, 0xEB86D391);
    a = addUnsigned(a, AA);
    b = addUnsigned(b, BB);
    c = addUnsigned(c, CC);
    d = addUnsigned(d, DD);
  }

  var temp = wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d);
  return temp.toLowerCase();
}

function utf8Encode(str) {
  var utftext = '';
  for (var n = 0; n < str.length; n++) {
    var c = str.charCodeAt(n);
    if (c < 128) {
      utftext += String.fromCharCode(c);
    } else if ((c > 127) && (c < 2048)) {
      utftext += String.fromCharCode((c >> 6) | 192);
      utftext += String.fromCharCode((c & 63) | 128);
    } else {
      utftext += String.fromCharCode((c >> 12) | 224);
      utftext += String.fromCharCode(((c >> 6) & 63) | 128);
      utftext += String.fromCharCode((c & 63) | 128);
    }
  }
  return utftext;
}

function base64Encode(str) {
  var b64chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
  var out = '';
  var i = 0;
  while (i < str.length) {
    var a = str.charCodeAt(i++) || 0;
    var b = str.charCodeAt(i++) || 0;
    var c = str.charCodeAt(i++) || 0;
    var b1 = (a >> 2) & 0x3F;
    var b2 = ((a & 0x3) << 4) | ((b >> 4) & 0xF);
    var b3 = ((b & 0xF) << 2) | ((c >> 6) & 0x3);
    var b4 = c & 0x3F;
    if (isNaN(b)) { b3 = 64; b4 = 64; }
    else if (isNaN(c)) { b4 = 64; }
    out += b64chars.charAt(b1) + b64chars.charAt(b2) + b64chars.charAt(b3) + b64chars.charAt(b4);
  }
  return out;
}

/**
 * 快递鸟数据签名
 * @param {string} requestData - JSON 请求体
 * @returns {string} Base64(MD5(requestData + APIKey))
 */
function kdnSign(requestData) {
  // 去除 JSON 中冒号和逗号后的空格
  var cleaned = requestData.replace(/: /g, ':').replace(/, /g, ',');
  var signStr = cleaned + KDN_API_KEY;
  var md5Hash = md5(signStr);
  // 快递鸟签名：直接对 MD5 十六进制字符串做 Base64 编码
  return base64Encode(md5Hash);
}

/**
 * 自动识别快递公司编码
 */
function autoDetectExpressCode(expressNo) {
  for (var i = 0; i < EXPRESS_CODE_PATTERNS.length; i++) {
    if (EXPRESS_CODE_PATTERNS[i].pattern.test(expressNo)) {
      return EXPRESS_CODE_PATTERNS[i].code;
    }
  }
  return null;
}

/**
 * 调用快递鸟即时查询 API
 * 使用 CORS 代理解决跨域问题
 */
function callKDNExpressAPI(shipperCode, logisticCode) {
  // 如果没有设置 EBusinessID，提示用户
  if (!KDN_EBUSINESS_ID) {
    return Promise.reject(new Error('EBusinessID 未配置'));
  }

  var requestData = JSON.stringify({
    OrderCode: '',
    ShipperCode: shipperCode,
    LogisticCode: logisticCode
  });

  var dataSign = kdnSign(requestData);

  // 方案1：尝试直接 POST（快递鸟可能支持 CORS）
  // 注意：快递鸟即时查询 RequestType=1002，格式为 application/x-www-form-urlencoded
  var formBody = 'RequestData=' + encodeURIComponent(requestData) +
    '&EBusinessID=' + encodeURIComponent(KDN_EBUSINESS_ID) +
    '&RequestType=1002' +
    '&DataSign=' + encodeURIComponent(dataSign) +
    '&DataType=2';

  return fetch(KDN_REQ_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
    },
    body: formBody
  }).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}

/**
 * 通过免费 CORS 代理调用快递鸟 API（备选方案）
 */
function callKDNViaProxy(shipperCode, logisticCode) {
  if (!KDN_EBUSINESS_ID) {
    return Promise.reject(new Error('EBusinessID 未配置'));
  }

  var requestData = JSON.stringify({
    OrderCode: '',
    ShipperCode: shipperCode,
    LogisticCode: logisticCode
  });

  var dataSign = kdnSign(requestData);

  // 使用多个 CORS 代理（按优先级尝试）
  // 注意：快递鸟 API 要求 POST + x-www-form-urlencoded，且参数需要 URL 编码
  var proxies = [
    {
      name: 'corsproxy.io',
      url: 'https://corsproxy.io/?' + encodeURIComponent(KDN_REQ_URL)
    },
    {
      name: 'allorigins',
      url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(KDN_REQ_URL)
    }
  ];

  function tryProxy(index) {
    if (index >= proxies.length) {
      return Promise.reject(new Error('所有代理均不可用，请检查网络连接'));
    }

    var proxy = proxies[index];
    var formBody = 'RequestData=' + encodeURIComponent(requestData) +
      '&EBusinessID=' + encodeURIComponent(KDN_EBUSINESS_ID) +
      '&RequestType=1002' +
      '&DataSign=' + encodeURIComponent(dataSign) +
      '&DataType=2';

    return fetch(proxy.url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: formBody
    }).then(function(res) {
      if (!res.ok) return tryProxy(index + 1);
      return res.text().then(function(text) {
        try {
          return JSON.parse(text);
        } catch (e) {
          console.error('代理返回非 JSON:', text.substring(0, 200));
          return tryProxy(index + 1);
        }
      });
    }).catch(function(err) {
      console.error('代理 ' + proxy.name + ' 失败:', err.message);
      return tryProxy(index + 1);
    });
  }

  return tryProxy(0);
}

/**
 * 外部快递单号查询 - 主入口
 */
function searchExternalExpress() {
  var expressNo = (document.getElementById('expressNoInput').value || '').trim();
  var companySelect = document.getElementById('expressCompanySelect').value;

  if (!expressNo) {
    showToast('请输入快递单号', 'warning');
    return;
  }

  if (!KDN_EBUSINESS_ID) {
    showToast('⚠️ 请先在快递鸟后台获取 EBusinessID，然后设置到页面中', 'warning');
    // 仍然展示提示，引导用户
    document.getElementById('logisticsContent').style.display = '';
    document.getElementById('emptyState').style.display = 'none';
    showExternalExpressPlaceholder(expressNo, companySelect);
    return;
  }

  // 显示加载状态
  showExpressLoading(true);

  // 自动识别快递公司
  var shipperCode = companySelect;
  if (companySelect === 'auto') {
    var detected = autoDetectExpressCode(expressNo);
    if (detected) {
      shipperCode = detected;
      document.getElementById('expressSearchHint').innerHTML =
        '🤖 已自动识别快递公司：<strong>' + getExpressCompanyName(detected) + '</strong>';
    } else {
      showExpressLoading(false);
      showToast('⚠️ 无法自动识别快递公司，请手动选择', 'warning');
      return;
    }
  }

  // 先尝试直接调用，失败则用代理
  callKDNExpressAPI(shipperCode, expressNo)
    .then(function(result) {
      showExpressLoading(false);
      handleExpressResult(result, expressNo, shipperCode);
    })
    .catch(function(err) {
      console.log('直接调用失败，尝试代理:', err.message);
      // 尝试代理
      return callKDNViaProxy(shipperCode, expressNo)
        .then(function(result) {
          showExpressLoading(false);
          handleExpressResult(result, expressNo, shipperCode);
        })
        .catch(function(err2) {
          showExpressLoading(false);
          console.error('快递查询失败:', err2);
          showToast('❌ 查询失败：' + (err2.message || '网络错误，请稍后重试'), 'error');
        });
    });
}

function getExpressCompanyName(code) {
  var select = document.getElementById('expressCompanySelect');
  for (var i = 0; i < select.options.length; i++) {
    if (select.options[i].value === code) return select.options[i].text;
  }
  return code;
}

function showExpressLoading(show) {
  var existingLoader = document.getElementById('expressLoader');
  if (show) {
    if (!existingLoader) {
      var loader = document.createElement('div');
      loader.id = 'expressLoader';
      loader.className = 'express-loading';
      loader.innerHTML = '<div class="express-loading-spinner"></div>正在查询快递物流信息...';
      document.getElementById('orderInfoArea').appendChild(loader);
    }
    document.getElementById('expressSearchBtn').disabled = true;
  } else {
    if (existingLoader) existingLoader.remove();
    document.getElementById('expressSearchBtn').disabled = false;
  }
}

function showExternalExpressPlaceholder(expressNo, companySelect) {
  document.getElementById('logisticsContent').style.display = '';
  document.getElementById('emptyState').style.display = 'none';

  // 显示提示信息
  document.getElementById('orderInfoArea').innerHTML =
    '<div class="express-loading" style="background:#fffbeb;color:#92400e;">' +
    '⚠️ <strong>EBusinessID 未配置</strong><br>' +
    '<small>快递单号：' + escapeHtml(expressNo) + ' | ' +
    '快递公司：' + (companySelect === 'auto' ? '自动识别' : escapeHtml(companySelect)) + '</small><br>' +
    '<small>请前往 <a href="http://www.kdniao.com/UserCenter/v2/UserHome.aspx" target="_blank" style="color:#2563eb;">快递鸟用户中心</a> ' +
    '获取 EBusinessID，然后在代码中设置 <code>KDN_EBUSINESS_ID</code> 变量。</small>' +
    '</div>';

  // 清空地图和时间轴
  clearMapAndTimeline();
}

function handleExpressResult(result, expressNo, shipperCode) {
  // 检查返回结果
  if (!result.Success) {
    var reason = result.Reason || '查询失败';
    showToast('❌ ' + reason, 'error');
    return;
  }

  var traces = result.Traces || [];
  var stateEx = result.StateEx || result.State || '0';
  var stateInfo = KDN_STATE_MAP[String(stateEx)] || { label: '状态未知', cls: 'delivering' };

  // 显示结果区域
  document.getElementById('logisticsContent').style.display = '';
  document.getElementById('emptyState').style.display = 'none';

  // 显示订单信息
  var infoHtml =
    '<div class="logistics-order-info">' +
    '<span>🚚 快递公司: <strong>' + getExpressCompanyName(shipperCode) + '</strong></span>' +
    '<span>🔢 单号: <strong>' + escapeHtml(expressNo) + '</strong></span>' +
    '<span>状态: <span class="express-result-badge ' + stateInfo.cls + '">' + stateInfo.label + '</span></span>' +
    '<span>轨迹数: <strong>' + traces.length + ' 条</strong></span>' +
    '</div>';

  // 显示预估到达时间
  if (result.EstimatedDeliveryTime) {
    infoHtml +=
      '<div style="font-size:0.75rem;color:#6b7280;padding:0.375rem 0.625rem;margin-top:0.375rem;">' +
      '📅 预计送达：<strong>' + escapeHtml(result.EstimatedDeliveryTime) + '</strong></div>';
  }

  document.getElementById('orderInfoArea').innerHTML = infoHtml;

  // 构建物流节点
  currentLogistics = {
    planNo: 'EXPRESS_' + expressNo,
    origin: { lat: null, lng: null, name: '发货地' },
    destination: { lat: null, lng: null, name: '收货地' },
    current: { lat: null, lng: null },
    nodes: [],
    updatedAt: new Date().toISOString()
  };

  // 解析轨迹
  if (traces.length > 0) {
    traces.forEach(function(trace, idx) {
      var nodeType = 'manual';
      var desc = trace.AcceptStation || '';
      if (desc.indexOf('揽收') !== -1 || desc.indexOf('收件') !== -1) nodeType = 'departed';
      else if (desc.indexOf('签收') !== -1 || desc.indexOf('已收') !== -1) nodeType = 'arrived';
      else if (desc.indexOf('运输') !== -1 || desc.indexOf('中转') !== -1 || desc.indexOf('到达') !== -1) nodeType = 'transit';
      else if (desc.indexOf('退回') !== -1 || desc.indexOf('异常') !== -1) nodeType = 'delayed';

      currentLogistics.nodes.push({
        type: nodeType,
        title: getExpressNodeTitle(nodeType, desc),
        desc: desc,
        location: trace.AcceptStation || '',
        time: trace.AcceptTime || '',
        lat: null,
        lng: null
      });
    });

    // 尝试解析坐标信息（快递鸟轨迹中可能包含经纬度）
    // 对于没有坐标的情况，设置默认地图中心为中国
    currentLogistics.current.lat = 35.86;
    currentLogistics.current.lng = 104.19;
  }

  // 重置地图和渲染
  clearMapAndTimeline();
  renderExternalTimeline();
  setTimeout(function() { initExternalMap(); }, 300);

  showToast('✅ 查询成功！共 ' + traces.length + ' 条物流轨迹', 'success');
}

function getExpressNodeTitle(type, desc) {
  if (desc.indexOf('揽收') !== -1) return '📦 已揽收';
  if (desc.indexOf('签收') !== -1) return '✅ 已签收';
  if (desc.indexOf('退回') !== -1) return '⚠️ 退回';
  if (desc.indexOf('到达') !== -1 || desc.indexOf('中转') !== -1) return '🔄 中转';
  if (desc.indexOf('派件') !== -1) return '🛵 派送中';
  if (desc.indexOf('发件') !== -1 || desc.indexOf('发出') !== -1) return '🚚 已发出';
  var labels = {
    'departed': '🚚 已出发',
    'transit': '🔄 运输中',
    'arrived': '✅ 已到达',
    'delayed': '⚠️ 异常',
    'manual': '📝 记录'
  };
  return labels[type] || '📝 物流记录';
}

function clearMapAndTimeline() {
  // 清除地图
  if (mapInstance) {
    try {
      mapLayers.forEach(function(l) { mapInstance.removeLayer(l); });
      mapLayers = [];
    } catch(e) {}
  }
  // 清除时间轴
  var body = document.getElementById('timelineBody');
  if (body) body.innerHTML = '<div class="logistics-empty"><div class="logistics-empty-icon">📭</div><p>暂无物流记录</p></div>';
  var countEl = document.getElementById('timelineCount');
  if (countEl) countEl.textContent = '';
}

function renderExternalTimeline() {
  var body = document.getElementById('timelineBody');
  var countEl = document.getElementById('timelineCount');
  if (!body || !currentLogistics) return;

  var nodes = currentLogistics.nodes || [];
  countEl.textContent = '共 ' + nodes.length + ' 条记录';

  if (nodes.length === 0) {
    body.innerHTML = '<div class="logistics-empty"><div class="logistics-empty-icon">📭</div><p>暂无物流记录</p></div>';
    return;
  }

  var html = '<div class="logistics-timeline">';
  nodes.forEach(function(node) {
    var timeStr = node.time || '';
    var dotClass = 'logistics-timeline-dot ' + (node.type || 'manual');

    html += '<div class="logistics-timeline-item">';
    html += '<div class="' + dotClass + '"></div>';
    html += '<div class="logistics-timeline-time">' + escapeHtml(timeStr) + '</div>';
    html += '<div class="logistics-timeline-title">' + escapeHtml(node.title || '') + '</div>';
    if (node.desc) {
      html += '<div class="logistics-timeline-desc">' + escapeHtml(node.desc) + '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

function initExternalMap() {
  if (mapInstance) {
    try {
      mapLayers.forEach(function(l) { mapInstance.removeLayer(l); });
      mapLayers = [];
    } catch(e) {}
  }

  var container = document.getElementById('logisticsMap');
  if (!container || container.offsetWidth === 0) return;
  if (container._mapInitializing) return;
  container._mapInitializing = true;

  try {
    if (typeof L === 'undefined') {
      container.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:0.875rem;">' +
        '📍 地图库加载中...</div>';
      container._mapInitializing = false;
      return;
    }

    // 重新初始化地图（如果有旧实例，先销毁）
    if (mapInstance) {
      try { mapInstance.remove(); } catch(e) {}
      mapInstance = null;
    }

    mapInstance = L.map('logisticsMap', {
      center: [35.86, 104.19],
      zoom: 5,
      zoomControl: true,
      attributionControl: false,
      scrollWheelZoom: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      minZoom: 3
    }).addTo(mapInstance);

    container._mapInitializing = false;

    // 如果有轨迹，渲染标记
    if (currentLogistics && currentLogistics.nodes && currentLogistics.nodes.length > 0) {
      renderMapMarkers();
    }
  } catch (e) {
    console.error('地图初始化失败:', e);
    container.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:0.875rem;">' +
      '⚠️ 地图加载失败</div>';
    container._mapInitializing = false;
  }
}

function showToast(msg, type) {
  var toast = document.getElementById('logisticsToast');
  if (!toast) return;
  toast.textContent = msg;
  toast.className = 'logistics-toast ' + (type || 'success');
  toast.style.display = 'block';

  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() {
    toast.style.display = 'none';
  }, 3000);
}
